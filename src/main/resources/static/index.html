<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧健康日誌與風險評估系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans h-screen flex flex-col overflow-hidden">

    <nav class="bg-indigo-600 text-white shadow-md flex-none">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">📊 智慧健康日誌與多層決策樹評估系統</h1>
            <span class="bg-indigo-500 px-3 py-1 rounded-full text-sm font-semibold">期末極致改良版</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8 flex-1 overflow-hidden w-full">
        
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between h-full overflow-y-auto">
            <div>
                <h2 id="formTitle" class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                    <span>📝</span> 新增今日健康日誌
                </h2>
                
                <form id="healthForm" class="space-y-4">
                    <input type="hidden" id="editLogId" value="">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">紀錄日期</label>
                        <input type="date" id="logDate" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    
                    <div>
                        <div class="flex justify-between">
                            <label class="block text-sm font-medium text-gray-700 mb-1">睡眠時間 (0 - 24 小時)</label>
                            <span id="sleepError" class="text-xs text-red-500 font-bold hidden">⚠️ 必須介於 0 至 24 之間</span>
                        </div>
                        <input type="number" id="sleepHours" step="0.1" placeholder="例如: 7.5" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    
                    <div>
                        <div class="flex justify-between">
                            <label class="block text-sm font-medium text-gray-700 mb-1">今日步數 (0 - 99,999 步)</label>
                            <span id="stepsError" class="text-xs text-red-500 font-bold hidden">⚠️ 必須介於 0 至 99,999 之間</span>
                        </div>
                        <input type="number" id="steps" placeholder="例如: 8000" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    
                    <div>
                        <div class="flex justify-between">
                            <label class="block text-sm font-medium text-gray-700 mb-1">心情分數 (1 - 10 分)</label>
                            <span id="moodError" class="text-xs text-red-500 font-bold hidden">⚠️ 必須介於 1 至 10 之間</span>
                        </div>
                        <input type="number" id="moodScore" placeholder="1 最差，10 最好" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </form>
            </div>

            <div>
                <div class="mt-6 p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                    <h3 class="text-sm font-bold text-indigo-800 mb-2 flex items-center gap-1">
                        <span>🌲</span> 多層決策樹即時風險評估
                    </h3>
                    <div class="flex items-center justify-between py-2">
                        <span class="text-sm text-gray-600">預測風險等級：</span>
                        <span id="liveRisk" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-200 text-gray-700">等待輸入...</span>
                    </div>
                    <p id="liveAdvice" class="text-xs text-gray-500 mt-1 italic">請填寫正確範圍內的數據，系統將自動啟動分支決策。</p>
                </div>

                <button type="button" id="submitBtn" onclick="submitLog()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition duration-200 shadow-sm disabled:bg-gray-300 disabled:cursor-not-allowed">
                    💾 儲存日誌並上傳雲端資料庫
                </button>
                <button type="button" id="cancelEditBtn" onclick="resetForm()" class="w-full mt-2 bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-1 px-4 rounded-lg transition duration-200 text-sm hidden">
                    取消修改
                </button>
            </div>
        </div>

        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full overflow-hidden">
            <div class="flex justify-between items-center mb-4 border-b pb-2 flex-none">
                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <span>📋</span> 雲端 MySQL 歷史健康日誌
                </h2>
                <button onclick="fetchLogs()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1 rounded-lg transition">
                    🔄 重新整理
                </button>
            </div>

            <div class="overflow-y-auto flex-1 pr-1">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-white z-10 shadow-sm">
                        <tr class="bg-gray-50 text-gray-500 text-xs tracking-wider uppercase border-b border-gray-100">
                            <th class="py-3 px-4 font-semibold">日期</th>
                            <th class="py-3 px-4 font-semibold">睡眠</th>
                            <th class="py-3 px-4 font-semibold">步數</th>
                            <th class="py-3 px-4 font-semibold">心情</th>
                            <th class="py-3 px-4 font-semibold">決策風險</th>
                            <th class="py-3 px-4 font-semibold text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="text-sm divide-y divide-gray-100 text-gray-600">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('logDate').value = new Date().toISOString().split('T')[0];

        const fields = [
            { id: 'sleepHours', min: 0, max: 24, errId: 'sleepError' },
            { id: 'steps', min: 0, max: 99999, errId: 'stepsError' },
            { id: 'moodScore', min: 1, max: 10, errId: 'moodError' }
        ];

        fields.forEach(field => {
            document.getElementById(field.id).addEventListener('input', () => {
                validateAndCalculate();
            });
        });

        let allLoadedLogs = [];

        function validateAndCalculate() {
            let hasError = false;
            
            fields.forEach(field => {
                const val = parseFloat(document.getElementById(field.id).value);
                const errSpan = document.getElementById(field.errId);
                
                if (!isNaN(val) && (val < field.min || val > field.max)) {
                    errSpan.classList.remove('hidden');
                    hasError = true;
                } else {
                    errSpan.classList.add('hidden');
                }
            });

            document.getElementById('submitBtn').disabled = hasError;

            if (hasError) {
                document.getElementById('liveRisk').className = "px-3 py-1 rounded-full text-xs font-bold bg-red-200 text-red-800";
                document.getElementById('liveRisk').innerText = "數據超限";
                document.getElementById('liveAdvice').innerText = "請修正紅字欄位之數值，否則系統無法存入資料庫。";
                return;
            }

            calculateLiveDecisionTree();
        }

        function calculateLiveDecisionTree() {
            const sleep = parseFloat(document.getElementById('sleepHours').value);
            const steps = parseInt(document.getElementById('steps').value);
            const mood = parseInt(document.getElementById('moodScore').value);
            const riskLabel = document.getElementById('liveRisk');
            const adviceLabel = document.getElementById('liveAdvice');

            if (isNaN(sleep) || isNaN(steps) || isNaN(mood)) {
                riskLabel.className = "px-3 py-1 rounded-full text-xs font-bold bg-gray-200 text-gray-700";
                riskLabel.innerText = "等待輸入...";
                adviceLabel.innerText = "請填寫正確範圍內的數據，系統將自動啟動分支決策。";
                return;
            }

            let risk = "LOW";
            let advice = "✅ 良好：指標皆在標準代數區間內，決策樹評估為低風險狀態！";

            if (sleep < 6.0) {
                if (steps < 4000) { risk = "HIGH"; advice = "⚠️ 警訊：睡眠極度不足且缺乏活動，決策樹將您歸類為高風險。"; }
                else { if (mood < 4) { risk = "HIGH"; advice = "⚠️ 警訊：睡眠不足且情緒低落，觸發高風險分支。"; } 
                       else { risk = "MEDIUM"; advice = "💡 提示：雖然今日有活動，但睡眠依舊不足，決策樹評估為中風險。"; } }
            } else {
                if (steps < 3000) {
                    if (mood < 5) { risk = "MEDIUM"; advice = "💡 提示：睡眠足夠但活動量與情緒皆偏低，落入中風險決策分支。"; }
                    else { risk = "LOW"; advice = "✅ 正常：今日呈靜態生活型態，綜合評估為低風險。"; }
                }
            }

            riskLabel.innerText = risk;
            if (risk === "HIGH") riskLabel.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700";
            else if (risk === "MEDIUM") riskLabel.className = "px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700";
            else riskLabel.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700";
            adviceLabel.innerText = advice;
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/api/health-logs');
                allLoadedLogs = await response.json();
                
                const tbody = document.getElementById('logTableBody');
                tbody.innerHTML = '';

                allLoadedLogs.forEach(log => {
                    let badgeClass = log.riskLevel === 'HIGH' ? 'bg-red-100 text-red-700' : 
                                     log.riskLevel === 'MEDIUM' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700';
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50/50 transition";
                    tr.innerHTML = `
                        <td class="py-3 px-4 font-medium text-gray-900">${log.logDate}</td>
                        <td class="py-3 px-4">${log.sleepHours} 小時</td>
                        <td class="py-3 px-4">${log.steps.toLocaleString()} 步</td>
                        <td class="py-3 px-4">${log.moodScore}分</td>
                        <td class="py-3 px-4"><span class="px-2 py-0.5 rounded-full text-xs font-bold ${badgeClass}">${log.riskLevel}</span></td>
                        <td class="py-3 px-4 text-center space-x-2">
                            <button onclick="startEdit(${log.id})" class="text-indigo-600 hover:text-indigo-900 font-medium text-xs">✏️ 修改</button>
                            <button onclick="deleteLog(${log.id})" class="text-red-600 hover:text-red-900 font-medium text-xs">❌ 刪除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error(error);
            }
        }

        function startEdit(id) {
            const log = allLoadedLogs.find(l => l.id === id);
            if (!log) return;

            document.getElementById('editLogId').value = log.id;
            document.getElementById('logDate').value = log.logDate;
            document.getElementById('sleepHours').value = log.sleepHours;
            document.getElementById('steps').value = log.steps;
            document.getElementById('moodScore').value = log.moodScore;

            document.getElementById('formTitle').innerHTML = "<span>✏️</span> 修改健康日誌";
            document.getElementById('submitBtn').innerText = "💾 更新日誌數據";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            validateAndCalculate();
        }

        function resetForm() {
            document.getElementById('editLogId').value = "";
            document.getElementById('healthForm').reset();
            document.getElementById('logDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('formTitle').innerHTML = "<span>📝</span> 新增今日健康日誌";
            document.getElementById('submitBtn').innerText = "💾 儲存日誌並上傳雲端資料庫";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            validateAndCalculate();
        }

        async function submitLog() {
            const editId = document.getElementById('editLogId').value;
            const date = document.getElementById('logDate').value;
            const sleep = parseFloat(document.getElementById('sleepHours').value);
            const steps = parseInt(document.getElementById('steps').value);
            const mood = parseInt(document.getElementById('moodScore').value);
            const risk = document.getElementById('liveRisk').innerText;

            if (!date || isNaN(sleep) || isNaN(steps) || isNaN(mood)) {
                alert("請填寫正確完整的數據！");
                return;
            }

            const payload = { logDate: date, sleepHours: sleep, steps: steps, moodScore: mood, riskLevel: risk };
            const url = editId ? `/api/health-logs/${editId}` : '/api/health-logs';
            const method = editId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    alert(editId ? '🎉 日誌更新成功！' : '🎉 新增資料成功！');
                    resetForm();
                    fetchLogs();
                }
            } catch (error) {
                alert('操作失敗，請檢查網路連線。');
            }
        }

        async function deleteLog(id) {
            if (!confirm('🚨 確定要永久刪除這筆健康日誌嗎？此操作不可逆！')) return;
            try {
                const response = await fetch(`/api/health-logs/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('❌ 資料已從資料庫中移除。');
                    fetchLogs();
                }
            } catch (error) {
                alert('刪除失敗');
            }
        }

        window.onload = fetchLogs;
    </script>
</body>
</html>
